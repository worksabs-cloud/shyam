apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nahid-pharmacy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nahid-pharmacy-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE
              value: http://backend:8000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nahid-pharmacy
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
