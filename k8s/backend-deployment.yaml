apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nahid-pharmacy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nahid-pharmacy-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nahid-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nahid-secrets
                  key: jwt-secret
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nahid-secrets
                  key: secret-key
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CORS_ORIGINS
              value: "*"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nahid-secrets
                  key: openai-api-key
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nahid-secrets
                  key: stripe-secret-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nahid-pharmacy
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
