services:
  db:
    image: postgres:16-alpine
    container_name: nahid-pharmacy-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-nahid}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-nahidpharmacy}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nahid}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nahid-pharmacy-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nahid-pharmacy-backend-prod
    environment:
      DATABASE_URL: postgresql://${DB_USER:-nahid}:${DB_PASSWORD}@db:5432/${DB_NAME:-nahidpharmacy}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nahid-pharmacy-frontend-prod
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.yourdomain.com}
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nahid-pharmacy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata_prod:
  redisdata_prod:
